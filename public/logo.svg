<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <!-- House roof -->
  <polygon points="140,40 40,130 70,130" stroke="#2B6B1A" stroke-width="8" fill="none" stroke-linejoin="round"/>
  <polygon points="140,40 240,130 210,130" stroke="#2B6B1A" stroke-width="8" fill="none" stroke-linejoin="round"/>
  <line x1="40" y1="130" x2="70" y2="130" stroke="#2B6B1A" stroke-width="8"/>
  <line x1="210" y1="130" x2="240" y2="130" stroke="#2B6B1A" stroke-width="8"/>

  <!-- House body -->
  <rect x="70" y="130" width="140" height="110" stroke="#2B6B1A" stroke-width="8" fill="none" rx="2"/>

  <!-- Door -->
  <rect x="115" y="170" width="50" height="70" stroke="#2B6B1A" stroke-width="8" fill="none" rx="2"/>

  <!-- Text: LeadHouse -->
  <text x="140" y="278" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#2B6B1A">LeadHouse</text>

  <!-- Decorative lines -->
  <line x1="30" y1="298" x2="90" y2="298" stroke="#2B6B1A" stroke-width="2.5"/>
  <line x1="190" y1="298" x2="250" y2="298" stroke="#2B6B1A" stroke-width="2.5"/>

  <!-- Subtitle -->
  <text x="140" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#2B6B1A">gestao imobiliaria</text>
</svg>
