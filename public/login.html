<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadHouse — Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.leadhouses.com.br/login" />
    <meta property="og:title" content="LeadHouse — Gestão Imobiliária Inteligente" />
    <meta property="og:description" content="Acesse o painel e gerencie leads, imóveis e visitas com IA." />
    <meta property="og:image" content="https://app.leadhouses.com.br/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -100px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.1), transparent 70%);
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -80px;
            background: radial-gradient(circle, rgba(47, 128, 194, 0.06), transparent 70%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.4);
        }

        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .login-logo img {
            height: 90px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            margin-bottom: 1.25rem;
        }

        .login-logo__title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #F5F5F5;
            letter-spacing: 1px;
        }

        .login-logo__subtitle {
            font-size: 0.6rem;
            color: #5A5A5A;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 6px;
        }

        .login-divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #C9A84C, transparent);
            margin: 0 auto 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5A5A5A;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(8px);
            color: #E0E0E0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            border-color: #C9A84C;
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.15);
        }

        .form-input::placeholder {
            color: #3A3A3A;
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: #C9A84C;
            color: #0A0A0A;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0.75rem;
        }

        .btn-login:hover {
            background: #D4B86A;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.2);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            display: none;
            background: rgba(138, 50, 50, 0.1);
            border: 1px solid rgba(138, 50, 50, 0.2);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.82rem;
            color: #D48A8A;
            margin-bottom: 1rem;
            text-align: center;
        }

        .login-error--show {
            display: block;
            animation: shakeIn 0.4s ease both;
        }

        @keyframes shakeIn {
            0% { transform: translateX(-8px); opacity: 0; }
            25% { transform: translateX(6px); }
            50% { transform: translateX(-4px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); opacity: 1; }
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.72rem;
            color: #3A3A3A;
            letter-spacing: 0.5px;
        }

        .login-footer a {
            color: #C9A84C;
            text-decoration: none;
            transition: 0.2s;
        }

        .login-footer a:hover {
            color: #D4B86A;
        }

        .login-toggle {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-toggle button {
            background: none;
            border: none;
            color: #5A5A5A;
            font-size: 0.78rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }

        .login-toggle button:hover {
            color: #C9A84C;
        }

        .login-toggle button span {
            color: #C9A84C;
            font-weight: 600;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10,10,10,0.2);
            border-top-color: #0A0A0A;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #E0E0E0;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .login-or {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
            color: #3A3A3A;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-or::before,
        .login-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
            .login-logo img { height: 48px; }
            .login-logo__title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" style="margin-bottom:0.75rem"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <div class="login-logo__title">LeadHouse</div>
            <div class="login-logo__subtitle">Gestão Imobiliária</div>
        </div>

        <div class="login-divider"></div>

        <div class="login-error" id="loginError"></div>

        <!-- Google Login -->
        <a href="/api/auth/google/login" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285f4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34a853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#fbbc04" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#ea4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
            Entrar com Google
        </a>

        <div class="login-or"><span>ou</span></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" class="form-input" id="loginSenha" placeholder="Sua senha" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
            <div style="text-align:center;margin-top:1rem">
                <a href="#" onclick="showForgot(event)" style="color:#5A5A5A;font-size:0.78rem;text-decoration:none;transition:0.2s" onmouseover="this.style.color='#C9A84C'" onmouseout="this.style.color='#5A5A5A'">Esqueci minha senha</a>
            </div>
        </form>

        <!-- Forgot Form (hidden) -->
        <form id="forgotForm" style="display:none;" onsubmit="handleForgot(event)">
            <p style="font-size:0.85rem;color:#888;margin-bottom:1.25rem;line-height:1.5">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-input" id="forgotEmail" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn-login" id="btnForgot">Enviar link</button>
            <div style="text-align:center;margin-top:1rem">
                <a href="#" onclick="showLogin(event)" style="color:#5A5A5A;font-size:0.78rem;text-decoration:none">← Voltar ao login</a>
            </div>
        </form>

        <!-- Register Form (hidden) -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" class="form-input" id="regNome" placeholder="Seu nome completo" required>
            </div>
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-input" id="regEmail" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" class="form-input" id="regSenha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-login" id="btnRegister">Criar Conta</button>
        </form>

        <div class="login-toggle">
            <button id="toggleBtn" onclick="toggleForm()">
                Não tem conta? <span>Criar conta</span>
            </button>
        </div>
    </div>

    <div class="login-footer">LeadHouse &mdash; Gestão imobiliária inteligente</div>
</div>

<script>
let isLogin = true;

// Verifica se ja esta logado ou recebeu token do Google
document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);

    // Google login callback
    if (params.get('google_token')) {
        localStorage.setItem('lh_token', params.get('google_token'));
        try { localStorage.setItem('lh_user', decodeURIComponent(params.get('google_user'))); } catch {}
        window.history.replaceState({}, '', '/login');
        window.location.href = '/';
        return;
    }
    if (params.get('error')) {
        const msgs = { google_denied: 'Login com Google cancelado', google_token: 'Erro ao autenticar com Google', google_email: 'Não foi possível obter seu e-mail', google_create: 'Erro ao criar conta', google_server: 'Erro interno' };
        showError(msgs[params.get('error')] || 'Erro ao fazer login com Google');
        window.history.replaceState({}, '', '/login');
    }

    const token = localStorage.getItem('lh_token');
    if (token) {
        const valid = await verificarToken(token);
        if (valid) window.location.href = '/';
    }
});

async function verificarToken(token) {
    try {
        const res = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        return res.ok;
    } catch { return false; }
}

function showError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.className = 'login-error login-error--show';
}

function hideError() {
    document.getElementById('loginError').className = 'login-error';
}

function setLoading(btn, loading) {
    if (loading) {
        btn.disabled = true;
        btn.dataset.text = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>Aguarde...';
    } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.text;
    }
}

async function handleLogin(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('btnLogin');
    setLoading(btn, true);

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('loginEmail').value.trim(),
                senha: document.getElementById('loginSenha').value,
            }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro ao fazer login');

        localStorage.setItem('lh_token', data.token);
        localStorage.setItem('lh_user', JSON.stringify(data.user));
        window.location.href = '/';
    } catch (err) {
        showError(err.message);
    } finally {
        setLoading(btn, false);
    }
}

async function handleRegister(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('btnRegister');
    setLoading(btn, true);

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome: document.getElementById('regNome').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                senha: document.getElementById('regSenha').value,
            }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro ao criar conta');

        localStorage.setItem('lh_token', data.token);
        localStorage.setItem('lh_user', JSON.stringify(data.user));
        window.location.href = '/';
    } catch (err) {
        showError(err.message);
    } finally {
        setLoading(btn, false);
    }
}

function showForgot(e) {
    if (e) e.preventDefault();
    hideError();
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('forgotForm').style.display = 'block';
    document.querySelector('.login-toggle').style.display = 'none';
}

function showLogin(e) {
    if (e) e.preventDefault();
    hideError();
    document.getElementById('forgotForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.querySelector('.login-toggle').style.display = 'block';
    isLogin = true;
}

async function handleForgot(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('btnForgot');
    setLoading(btn, true);
    try {
        const res = await fetch('/api/auth/forgot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('forgotEmail').value.trim() }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro ao enviar link');
        const el = document.getElementById('loginError');
        el.textContent = 'Se o e-mail existir, voce recebera um link em instantes. Verifique sua caixa de entrada.';
        el.style.background = 'rgba(50, 138, 80, 0.1)';
        el.style.borderColor = 'rgba(50, 138, 80, 0.3)';
        el.style.color = '#8AD4A0';
        el.className = 'login-error login-error--show';
    } catch (err) {
        showError(err.message);
    } finally {
        setLoading(btn, false);
    }
}

function toggleForm() {
    isLogin = !isLogin;
    hideError();
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('toggleBtn').innerHTML = isLogin
        ? 'Não tem conta? <span>Criar conta</span>'
        : 'Já tem conta? <span>Entrar</span>';
}
</script>

</body>
</html>
