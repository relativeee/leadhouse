<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadHouse — Redefinir senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0A0A0A; color: #E0E0E0; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; opacity: 0.5; }
        body::before { width: 500px; height: 500px; top: -150px; right: -100px; background: radial-gradient(circle, rgba(201,168,76,0.1), transparent 70%); }
        body::after  { width: 400px; height: 400px; bottom: -100px; left: -80px; background: radial-gradient(circle, rgba(47,128,194,0.06), transparent 70%); }
        .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 1.5rem; }
        .card { background: rgba(20,20,20,0.65); backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 3rem 2.5rem; box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.4); }
        .logo { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
        .logo img { height:90px; margin-bottom:0.5rem; }
        .logo__title { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:600; color:#F5F5F5; letter-spacing:1px; }
        .logo__subtitle { font-size:0.6rem; color:#5A5A5A; text-transform:uppercase; letter-spacing:3px; margin-top:6px; }
        .divider { width:40px; height:1px; background:linear-gradient(90deg, transparent, #C9A84C, transparent); margin:0 auto 2rem; }
        h2 { font-family:'Playfair Display',serif; font-size:1.2rem; text-align:center; color:#F5F5F5; margin-bottom:0.5rem; }
        .subtitle { text-align:center; color:#888; font-size:0.85rem; margin-bottom:1.75rem; }
        .form-group { margin-bottom:1.25rem; }
        .form-label { display:block; font-size:0.6rem; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:#5A5A5A; margin-bottom:0.5rem; }
        .form-input { width:100%; padding:0.8rem 1rem; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(26,26,26,0.7); color:#E0E0E0; font-size:0.9rem; outline:none; transition:0.3s; }
        .form-input:focus { border-color:#C9A84C; box-shadow:0 0 0 2px rgba(201,168,76,0.15); }
        .form-input::placeholder { color:#3A3A3A; }
        .btn { width:100%; padding:0.8rem; border:none; border-radius:8px; background:#C9A84C; color:#0A0A0A; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; transition:0.3s; margin-top:0.75rem; }
        .btn:hover { background:#D4B86A; box-shadow:0 4px 20px rgba(201,168,76,0.2); transform:translateY(-1px); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .msg { display:none; border-radius:8px; padding:0.7rem 1rem; font-size:0.82rem; margin-bottom:1rem; text-align:center; }
        .msg--show { display:block; }
        .msg--error { background:rgba(138,50,50,0.1); border:1px solid rgba(138,50,50,0.2); color:#D48A8A; }
        .msg--ok { background:rgba(50,138,80,0.1); border:1px solid rgba(50,138,80,0.3); color:#8AD4A0; }
        .back { text-align:center; margin-top:1.5rem; }
        .back a { color:#5A5A5A; font-size:0.78rem; text-decoration:none; transition:0.2s; }
        .back a:hover { color:#C9A84C; }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(10,10,10,0.2); border-top-color:#0A0A0A; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <img src="/logo.png" alt="LeadHouse">
            <div class="logo__subtitle">Gestão Imobiliária</div>
        </div>
        <div class="divider"></div>
        <h2>Redefinir senha</h2>
        <p class="subtitle">Crie uma nova senha para sua conta</p>

        <div class="msg" id="msg"></div>

        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label class="form-label">Nova senha</label>
                <input type="password" class="form-input" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar senha</label>
                <input type="password" class="form-input" id="senha2" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="btn">Redefinir senha</button>
        </form>

        <div class="back"><a href="/login">← Voltar ao login</a></div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
    showMsg('Link invalido. Solicite um novo em "Esqueci minha senha".', 'error');
    document.getElementById('resetForm').style.display = 'none';
}

function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg msg--show msg--' + type;
}

async function handleReset(e) {
    e.preventDefault();
    const senha = document.getElementById('senha').value;
    const senha2 = document.getElementById('senha2').value;
    if (senha !== senha2) return showMsg('As senhas não coincidem', 'error');

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Aguarde...';

    try {
        const res = await fetch('/api/auth/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, senha }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro ao redefinir senha');
        showMsg('Senha redefinida! Redirecionando para o login...', 'ok');
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => window.location.href = '/login', 2000);
    } catch (err) {
        showMsg(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Redefinir senha';
    }
}
</script>
</body>
</html>
